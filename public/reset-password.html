<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Scrave</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&family=Cabinet+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-layer aurora-1"></div>
    <div class="aurora-layer aurora-2"></div>
    <div class="grain"></div>
  </div>

  <nav class="navbar scrolled">
    <div class="container nav-inner">
      <a href="/" class="logo">
        <img src="/logo.png" alt="Scrave" class="logo-img" />
        Scrave
      </a>
    </div>
  </nav>

  <main style="padding:160px 0 80px;min-height:100vh;">
    <div class="container" style="max-width:440px;">
      <div class="modal" style="position:relative;background:var(--surface-deep);border:1px solid var(--border-subtle);border-radius:var(--r-xl);padding:40px 36px;">

        <!-- Reset form -->
        <div id="reset-form-wrap">
          <h2 style="text-align:left;font-size:1.5rem;margin-bottom:6px;">Reset your password</h2>
          <p style="color:var(--text-mid);font-size:0.9rem;margin-bottom:28px;">Enter your new password below.</p>

          <form id="reset-form">
            <div class="form-group">
              <label for="new-password">New Password <span class="required">*</span></label>
              <input type="password" id="new-password" placeholder="Min 8 characters" minlength="8" required />
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm Password <span class="required">*</span></label>
              <input type="password" id="confirm-password" placeholder="Repeat password" minlength="8" required />
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-submit" id="reset-btn" disabled>
              <span id="reset-btn-text">Reset Password</span>
            </button>
            <p id="reset-error" class="form-error" hidden></p>
          </form>
        </div>

        <!-- Success state -->
        <div id="reset-success" hidden style="text-align:center;padding:20px 0;">
          <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;margin:0 auto 16px;">&#10003;</div>
          <h3 style="font-size:1.3rem;margin-bottom:8px;">Password reset!</h3>
          <p style="color:var(--text-mid);margin-bottom:20px;">You can now login with your new password.</p>
          <a href="/" class="btn btn-primary btn-block">Go to Login</a>
        </div>

        <!-- Invalid token state -->
        <div id="reset-invalid" hidden style="text-align:center;padding:20px 0;">
          <p style="color:var(--hue-magenta);font-size:1rem;margin-bottom:20px;">This reset link is invalid or has expired.</p>
          <a href="/" class="btn btn-glass btn-block">Back to Home</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        document.getElementById('reset-form-wrap').hidden = true;
        document.getElementById('reset-invalid').hidden = false;
        return;
      }

      const form = document.getElementById('reset-form');
      const newPass = document.getElementById('new-password');
      const confirmPass = document.getElementById('confirm-password');
      const btn = document.getElementById('reset-btn');
      const btnText = document.getElementById('reset-btn-text');
      const errEl = document.getElementById('reset-error');

      function checkValid() {
        btn.disabled = !(newPass.value.length >= 8 && confirmPass.value.length >= 8);
      }
      newPass.addEventListener('input', checkValid);
      confirmPass.addEventListener('input', checkValid);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.hidden = true;

        if (newPass.value !== confirmPass.value) {
          errEl.textContent = 'Passwords do not match';
          errEl.hidden = false;
          return;
        }

        btnText.textContent = 'Resetting...';
        btn.disabled = true;

        try {
          const res = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: newPass.value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error?.message || 'Reset failed');

          document.getElementById('reset-form-wrap').hidden = true;
          document.getElementById('reset-success').hidden = false;
        } catch (err) {
          errEl.textContent = err.message;
          errEl.hidden = false;
          btnText.textContent = 'Reset Password';
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
