<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Scrave</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&family=Cabinet+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-layer aurora-1"></div>
    <div class="aurora-layer aurora-2"></div>
    <div class="grain"></div>
  </div>

  <nav class="navbar scrolled">
    <div class="container nav-inner">
      <a href="/" class="logo">
        <img src="/logo.png" alt="Scrave" class="logo-img" />
        Scrave
      </a>
    </div>
  </nav>

  <main style="padding:160px 0 80px;min-height:100vh;">
    <div class="container" style="max-width:440px;">
      <div class="modal" style="position:relative;background:var(--surface-deep);border:1px solid var(--border-subtle);border-radius:var(--r-xl);padding:40px 36px;">

        <!-- Reset form -->
        <div id="reset-form-wrap">
          <h2 style="text-align:left;font-size:1.5rem;margin-bottom:6px;">Reset your password</h2>
          <p style="color:var(--text-mid);font-size:0.9rem;margin-bottom:28px;">Enter your new password below.</p>

          <form id="reset-form">
            <div class="form-group">
              <label for="new-password">New Password <span class="required">*</span></label>
              <div class="password-wrap">
                <input type="password" id="new-password" placeholder="Min 8 characters" minlength="8" required />
                <button type="button" class="toggle-pw" onclick="togglePw(this)" aria-label="Show password">
                  <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
              <div class="pw-strength" id="reset-pw-strength">
                <span class="pw-rule" id="rpw-len">8+ characters</span>
                <span class="pw-rule" id="rpw-upper">Uppercase</span>
                <span class="pw-rule" id="rpw-lower">Lowercase</span>
                <span class="pw-rule" id="rpw-num">Number</span>
                <span class="pw-rule" id="rpw-special">Special char</span>
              </div>
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm Password <span class="required">*</span></label>
              <div class="password-wrap">
                <input type="password" id="confirm-password" placeholder="Repeat password" minlength="8" required />
                <button type="button" class="toggle-pw" onclick="togglePw(this)" aria-label="Show password">
                  <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-submit" id="reset-btn" disabled>
              <span class="spinner" id="reset-spinner" hidden></span>
              <span id="reset-btn-text">Reset Password</span>
            </button>
            <p id="reset-error" class="form-error" hidden></p>
          </form>
        </div>

        <!-- Success state -->
        <div id="reset-success" hidden style="text-align:center;padding:20px 0;">
          <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;margin:0 auto 16px;">&#10003;</div>
          <h3 style="font-size:1.3rem;margin-bottom:8px;">Password reset!</h3>
          <p style="color:var(--text-mid);margin-bottom:20px;">You can now login with your new password.</p>
          <a href="/" class="btn btn-primary btn-block">Go to Login</a>
        </div>

        <!-- Invalid token state -->
        <div id="reset-invalid" hidden style="text-align:center;padding:20px 0;">
          <p style="color:var(--hue-magenta);font-size:1rem;margin-bottom:20px;">This reset link is invalid or has expired.</p>
          <a href="/" class="btn btn-glass btn-block">Back to Home</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    function togglePw(btn) {
      var input = btn.parentElement.querySelector('input');
      var open = btn.querySelector('.eye-open');
      var closed = btn.querySelector('.eye-closed');
      if (input.type === 'password') {
        input.type = 'text';
        open.style.display = 'none';
        closed.style.display = '';
      } else {
        input.type = 'password';
        open.style.display = '';
        closed.style.display = 'none';
      }
    }

    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      if (!token) {
        document.getElementById('reset-form-wrap').hidden = true;
        document.getElementById('reset-invalid').hidden = false;
        return;
      }

      var form = document.getElementById('reset-form');
      var newPass = document.getElementById('new-password');
      var confirmPass = document.getElementById('confirm-password');
      var btn = document.getElementById('reset-btn');
      var btnText = document.getElementById('reset-btn-text');
      var spinner = document.getElementById('reset-spinner');
      var errEl = document.getElementById('reset-error');

      function checkPwStrength(pw) {
        return { len: pw.length >= 8, upper: /[A-Z]/.test(pw), lower: /[a-z]/.test(pw), num: /[0-9]/.test(pw), special: /[^A-Za-z0-9]/.test(pw) };
      }
      function updateRules(pw) {
        var rules = checkPwStrength(pw);
        var ids = { len: 'len', upper: 'upper', lower: 'lower', num: 'num', special: 'special' };
        var allPass = true;
        for (var key in ids) {
          var el = document.getElementById('rpw-' + ids[key]);
          if (!el) continue;
          if (pw.length === 0) { el.className = 'pw-rule'; }
          else if (rules[key]) { el.className = 'pw-rule pass'; }
          else { el.className = 'pw-rule fail'; allPass = false; }
        }
        return allPass && pw.length > 0;
      }
      function isStrong(pw) {
        var r = checkPwStrength(pw);
        return r.len && r.upper && r.lower && r.num && r.special;
      }
      function checkValid() {
        btn.disabled = !(isStrong(newPass.value) && confirmPass.value.length >= 8);
      }
      newPass.addEventListener('input', function() {
        updateRules(newPass.value);
        checkValid();
      });
      confirmPass.addEventListener('input', checkValid);

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errEl.hidden = true;

        if (newPass.value !== confirmPass.value) {
          errEl.textContent = 'Passwords do not match';
          errEl.hidden = false;
          return;
        }

        spinner.hidden = false;
        btnText.textContent = 'Resetting...';
        btn.disabled = true;

        try {
          var res = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, password: newPass.value }),
          });
          var data = await res.json();
          if (!res.ok) throw new Error(data.error?.message || 'Reset failed');

          document.getElementById('reset-form-wrap').hidden = true;
          document.getElementById('reset-success').hidden = false;
        } catch (err) {
          errEl.textContent = err.message;
          errEl.hidden = false;
          spinner.hidden = true;
          btnText.textContent = 'Reset Password';
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
